# Security-focused clippy configuration for Aframp backend.
# Applied in CI via: cargo clippy -- -D warnings -D clippy::all

# Disallow integer arithmetic that can overflow in financial calculations.
# Use checked_add / checked_mul / saturating_* instead.
arithmetic-side-effects-allowed-binary = []
arithmetic-side-effects-allowed-unary = []

# Maximum allowed complexity — keeps security-critical code reviewable.
cognitive-complexity-threshold = 25
too-many-arguments-threshold = 8
