[advisories]
ignore = [
    "RUSTSEC-2023-0071",  # RSA timing variability
    "RUSTSEC-2026-0007",  # RustCrypto: AES timing variability
    "RUSTSEC-2026-0009",  # RustCrypto: SHA-1 timing variability
]

# ---------------------------------------------------------------------------
# Security compliance framework — deny policy
# ---------------------------------------------------------------------------
# Fail the build on any advisory not in the ignore list above.
# The ignore list above represents formally accepted risks with justification.
# All entries must have a corresponding record in security_vuln_allowlist.
[output]
deny = ["warnings", "unsound", "yanked"]
