# =============================================================================
# Nginx API Gateway — Aframp backend
# Single entry point for all inbound API traffic.
# TLS termination, security headers, HSTS, OCSP stapling, HTTP→HTTPS redirect.
# All configuration is version-controlled — no manual changes permitted.
# =============================================================================

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    # Hide nginx version from all responses
    server_tokens off;

    # Structured JSON access log
    log_format json_combined escape=json
        '{"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"bytes_sent":$bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time",'
        '"request_id":"$http_x_request_id",'
        '"rejection_reason":"$upstream_http_x_rejection_reason"}';

    access_log /var/log/nginx/access.log json_combined;
    error_log  /var/log/nginx/error.log warn;

    # Upstream — application containers (HA: two instances behind gateway)
    upstream aframp_backend {
        least_conn;
        server app1:8000 max_fails=3 fail_timeout=30s;
        server app2:8000 max_fails=3 fail_timeout=30s backup;
        keepalive 64;
    }

    # -------------------------------------------------------------------------
    # Global limits
    # -------------------------------------------------------------------------
    client_max_body_size 10m;
    client_body_timeout  30s;
    client_header_timeout 10s;
    send_timeout 30s;
    keepalive_timeout 65s;

    # Limit request URI length
    large_client_header_buffers 4 8k;

    # -------------------------------------------------------------------------
    # HTTP → HTTPS redirect (301 permanent)
    # -------------------------------------------------------------------------
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # Allow Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # -------------------------------------------------------------------------
    # HTTPS server — TLS termination
    # -------------------------------------------------------------------------
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name aframp.io app.aframp.io api.aframp.io;

        # TLS certificates (managed by Certbot / ACM)
        ssl_certificate     /etc/letsencrypt/live/aframp.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/aframp.io/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/aframp.io/chain.pem;

        # TLS protocol — minimum TLS 1.2, TLS 1.0 and 1.1 explicitly excluded
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        # Strong cipher suite allowlist — no RC4, DES, MD5, EXPORT, NULL, anon
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';

        # Session resumption
        ssl_session_cache   shared:SSL:50m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # DH parameters
        ssl_dhparam /etc/nginx/dhparam.pem;

        # OCSP stapling — efficient certificate revocation checking
        ssl_stapling        on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4 1.1.1.1 valid=300s;
        resolver_timeout 5s;

        # ── Security response headers (injected on all responses) ─────────────
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options           "DENY"                                          always;
        add_header X-Content-Type-Options    "nosniff"                                       always;
        add_header X-XSS-Protection          "1; mode=block"                                 always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;
        add_header Content-Security-Policy   "default-src 'none'; frame-ancestors 'none'"   always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()"      always;

        # Strip internal infrastructure headers from consumer-facing responses
        proxy_hide_header X-Powered-By;
        proxy_hide_header X-Upstream-Service;
        proxy_hide_header X-Internal-Request-Id;
        more_clear_headers Server;

        # ── Request size limits per endpoint category ─────────────────────────
        location ~* ^/api/v1/(kyc|document) {
            client_max_body_size 10m;
            include /etc/nginx/gateway_proxy.conf;
        }

        location ~* ^/api/v1/(onramp|offramp|payment) {
            client_max_body_size 64k;
            include /etc/nginx/gateway_proxy.conf;
        }

        # ── Health / readiness — no auth required, not forwarded to app ───────
        location = /health {
            access_log off;
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        location = /ready {
            access_log off;
            proxy_pass http://aframp_backend/health;
        }

        # ── Default proxy to upstream ─────────────────────────────────────────
        location / {
            include /etc/nginx/gateway_proxy.conf;
        }
    }
}
