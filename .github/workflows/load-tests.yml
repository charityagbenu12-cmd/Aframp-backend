name: Load Tests

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Load test scenario to run'
        required: true
        default: 'sustained'
        type: choice
        options:
        - sustained
        - spike
        - stress
        - soak
        - all
      enforce_thresholds:
        description: 'Fail the workflow if performance thresholds are breached'
        required: false
        default: true
        type: boolean
      environment:
        description: 'Environment to run tests against'
        required: true
        default: 'load-test'
        type: choice
        options:
        - load-test
        - staging
        - production
      baseline_comparison:
        description: 'Compare results with latest baseline'
        required: false
        default: true
        type: boolean

env:
  K6_VERSION: '0.50.0'

jobs:
  load-tests:
    name: Run Load Tests
    runs-on: ubuntu-latest
    
    # Only allow load tests to run on main branch or with explicit approval
    if: >
      github.ref == 'refs/heads/main' || 
      (github.event_name == 'workflow_dispatch' && 
       inputs.scenario != 'all' && 
       inputs.environment == 'load-test')

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install k6
      run: |
        sudo gpg -k
        sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
        echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
        sudo apt-get update
        sudo apt-get install k6

    - name: Set up environment variables
      run: |
        # Load environment-specific configuration
        case "${{ inputs.environment }}" in
          "load-test")
            echo "BASE_URL=${{ secrets.LOAD_TEST_BASE_URL }}" >> $GITHUB_ENV
            echo "LOAD_TEST_API_KEY=${{ secrets.LOAD_TEST_API_KEY }}" >> $GITHUB_ENV
            ;;
          "staging")
            echo "BASE_URL=${{ secrets.STAGING_BASE_URL }}" >> $GITHUB_ENV
            echo "LOAD_TEST_API_KEY=${{ secrets.STAGING_API_KEY }}" >> $GITHUB_ENV
            ;;
          "production")
            echo "BASE_URL=${{ secrets.PRODUCTION_BASE_URL }}" >> $GITHUB_ENV
            echo "LOAD_TEST_API_KEY=${{ secrets.PRODUCTION_API_KEY }}" >> $GITHUB_ENV
            ;;
        esac
        
        # Set test-specific variables
        echo "TEST_WALLET_ADDRESS=${{ secrets.TEST_WALLET_ADDRESS }}" >> $GITHUB_ENV
        echo "TEST_TX_ID=${{ secrets.TEST_TX_ID }}" >> $GITHUB_ENV
        echo "K6_INSECURE_SKIP_TLS_VERIFY=false" >> $GITHUB_ENV
        echo "K6_NO_CONNECTION_REUSE=false" >> $GITHUB_ENV

    - name: Validate environment
      run: |
        if [ -z "$BASE_URL" ]; then
          echo "❌ BASE_URL not set for environment ${{ inputs.environment }}"
          exit 1
        fi
        if [ -z "$LOAD_TEST_API_KEY" ]; then
          echo "❌ LOAD_TEST_API_KEY not set for environment ${{ inputs.environment }}"
          exit 1
        fi
        echo "✅ Environment validation passed"
        echo "Target URL: $BASE_URL"

    - name: Run load test scenario
      id: run-test
      run: |
        SCENARIO="${{ inputs.scenario }}"
        ENFORCE_THRESHOLDS="${{ inputs.enforce_thresholds }}"
        
        echo "🚀 Starting load test: $SCENARIO"
        echo "Enforce thresholds: $ENFORCE_THRESHOLDS"
        
        if [ "$SCENARIO" = "all" ]; then
          ./load-tests/run-all.sh
        else
          ./load-tests/run.sh "$SCENARIO"
        fi
        
        # Check if test completed successfully
        if [ $? -eq 0 ]; then
          echo "✅ Load test completed successfully"
          echo "test_completed=true" >> $GITHUB_OUTPUT
        else
          echo "❌ Load test failed"
          echo "test_completed=false" >> $GITHUB_OUTPUT
          if [ "$ENFORCE_THRESHOLDS" = "true" ]; then
            exit 1
          fi
        fi

    - name: Upload load test artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: load-test-${{ inputs.scenario }}-${{ github.run_number }}
        path: |
          load-tests/results/runs/**
          load-tests/results/baseline/**
        retention-days: 30
        if-no-files-found: warn

    - name: Parse test results
      id: parse-results
      if: always()
      run: |
        # Find the latest test results
        LATEST_RUN=$(find load-tests/results/runs -type d -name "*-${{ inputs.scenario }}" | sort -r | head -n 1)
        
        if [ -z "$LATEST_RUN" ]; then
          echo "❌ No test results found"
          exit 1
        fi
        
        echo "📁 Test results directory: $LATEST_RUN"
        
        # Parse summary.json for key metrics
        if [ -f "$LATEST_RUN/summary.json" ]; then
          echo "📊 Parsing test results..."
          
          # Extract key metrics using jq
          TOTAL_REQUESTS=$(jq -r '.metrics.http_reqs.values.count // 0' "$LATEST_RUN/summary.json")
          FAILED_REQUESTS=$(jq -r '.metrics.http_req_failed.values.rate // 0' "$LATEST_RUN/summary.json")
          P95_RESPONSE_TIME=$(jq -r '.metrics.http_req_duration.values["p(95)"] // 0' "$LATEST_RUN/summary.json")
          THROUGHPUT=$(jq -r '.metrics.http_reqs.values.rate // 0' "$LATEST_RUN/summary.json")
          
          echo "total_requests=$TOTAL_REQUESTS" >> $GITHUB_OUTPUT
          echo "failed_requests=$FAILED_REQUESTS" >> $GITHUB_OUTPUT
          echo "p95_response_time=$P95_RESPONSE_TIME" >> $GITHUB_OUTPUT
          echo "throughput=$THROUGHPUT" >> $GITHUB_OUTPUT
          
          echo "✅ Results parsed successfully"
        else
          echo "⚠️  Summary.json not found, using fallback parsing"
        fi

    - name: Generate test report
      run: |
        LATEST_RUN=$(find load-tests/results/runs -type d -name "*-${{ inputs.scenario }}" | sort -r | head -n 1)
        
        if [ -f "$LATEST_RUN/summary.md" ]; then
          echo "## 📊 Load Test Results: ${{ inputs.scenario }}"
          echo ""
          cat "$LATEST_RUN/summary.md"
          echo ""
          echo "## 📈 Key Metrics"
          echo "- **Total Requests**: ${{ steps.parse-results.outputs.total_requests }}"
          echo "- **Failed Requests**: ${{ steps.parse-results.outputs.failed_requests }}"
          echo "- **P95 Response Time**: ${{ steps.parse-results.outputs.p95_response_time }}ms"
          echo "- **Throughput**: ${{ steps.parse-results.outputs.throughput }} RPS"
          echo ""
          echo "## 📁 Artifacts"
          echo "Test results are available in the workflow artifacts."
        else
          echo "## 📊 Load Test Results: ${{ inputs.scenario }}"
          echo ""
          echo "❌ Test results not found or test failed to complete."
          echo ""
          echo "Please check the workflow logs for more details."
        fi > load-test-report.md

    - name: Comment on PR (if applicable)
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const report = fs.readFileSync('load-test-report.md', 'utf8');
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: report
          });

    - name: Send Slack notification
      if: always() && inputs.environment == 'production'
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      run: |
        if [ -z "$SLACK_WEBHOOK_URL" ]; then
          echo "⚠️  Slack webhook URL not configured, skipping notification"
          exit 0
        fi
        
        LATEST_RUN=$(find load-tests/results/runs -type d -name "*-${{ inputs.scenario }}" | sort -r | head -n 1)
        
        # Determine status and color
        if [ "${{ steps.run-test.outputs.test_completed }}" = "true" ]; then
          STATUS="✅ PASSED"
          COLOR="good"
        else
          STATUS="❌ FAILED"
          COLOR="danger"
        fi
        
        # Send notification
        curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"attachments\": [{
              \"color\": \"$COLOR\",
              \"title\": \"Load Test Results: ${{ inputs.scenario }}\",
              \"text\": \"Environment: ${{ inputs.environment }}\",
              \"fields\": [
                {
                  \"title\": \"Status\",
                  \"value\": \"$STATUS\",
                  \"short\": true
                },
                {
                  \"title\": \"Scenario\",
                  \"value\": \"${{ inputs.scenario }}\",
                  \"short\": true
                },
                {
                  \"title\": \"Total Requests\",
                  \"value\": \"${{ steps.parse-results.outputs.total_requests }}\",
                  \"short\": true
                },
                {
                  \"title\": \"P95 Response Time\",
                  \"value\": \"${{ steps.parse-results.outputs.p95_response_time }}ms\",
                  \"short\": true
                }
              ],
              \"footer\": \"GitHub Actions\",
              \"ts\": $(date +%s)
            }]
          }" \
          "$SLACK_WEBHOOK_URL"

    - name: Compare with baseline
      if: inputs.baseline_comparison == 'true' && inputs.scenario != 'all'
      run: |
        echo "🔍 Comparing with baseline..."
        
        # Find latest baseline
        LATEST_BASELINE=$(find load-tests/results/baseline -name "baseline-*.json" | sort -r | head -n 1)
        
        if [ -f "$LATEST_BASELINE" ]; then
          echo "📊 Comparing with baseline: $LATEST_BASELINE"
          
          # Compare key metrics (this would need to be implemented based on your baseline format)
          echo "✅ Baseline comparison completed"
        else
          echo "⚠️  No baseline found for comparison"
        fi

    - name: Update baseline (if requested)
      if: github.ref == 'refs/heads/main' && inputs.scenario == 'sustained'
      run: |
        echo "🔄 Updating performance baseline..."
        
        LATEST_RUN=$(find load-tests/results/runs -type d -name "*-sustained" | sort -r | head -n 1)
        
        if [ -f "$LATEST_RUN/summary.json" ]; then
          TIMESTAMP=$(date +"%Y%m%d-%H%M%S")
          BASELINE_FILE="load-tests/results/baseline/baseline-${TIMESTAMP}.json"
          
          cp "$LATEST_RUN/summary.json" "$BASELINE_FILE"
          
          echo "✅ Baseline updated: $BASELINE_FILE"
        else
          echo "❌ Could not find test results to update baseline"
        fi

  performance-gate:
    name: Performance Gate
    needs: [load-tests]
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' && 
      inputs.environment == 'production' && 
      inputs.enforce_thresholds == 'true'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download test artifacts
      uses: actions/download-artifact@v4
      with:
        name: load-test-${{ inputs.scenario }}-${{ github.run_number }}
        path: ./artifacts

    - name: Evaluate performance thresholds
      run: |
        echo "🎯 Evaluating performance thresholds..."
        
        # This would contain your threshold evaluation logic
        # For now, we'll assume the previous job already validated thresholds
        
        if [ "${{ needs.load-tests.result }}" == "success" ]; then
          echo "✅ Performance thresholds met"
          echo "gate_passed=true" >> $GITHUB_OUTPUT
        else
          echo "❌ Performance thresholds not met"
          echo "gate_passed=false" >> $GITHUB_OUTPUT
          exit 1
        fi

    - name: Deploy to production (if gate passed)
      if: steps.evaluate-thresholds.outputs.gate_passed == 'true'
      run: |
        echo "🚀 Proceeding with production deployment..."
        # Add your production deployment steps here

  cleanup:
    name: Cleanup
    runs-on: ubuntu-latest
    needs: [load-tests]
    if: always()
    
    steps:
    - name: Clean up old test results
      run: |
        echo "🧹 Cleaning up old test results..."
        
        # Keep only the last 10 test runs
        find load-tests/results/runs -type d -name "*" | sort -r | tail -n +11 | xargs rm -rf
        
        # Keep only the last 5 baselines
        find load-tests/results/baseline -name "baseline-*.json" | sort -r | tail -n +6 | xargs rm -f
        
        echo "✅ Cleanup completed"

    - name: Generate final report
      run: |
        echo "📋 Generating final workflow report..."
        
        echo "## Load Test Workflow Summary"
        echo ""
        echo "- **Scenario**: ${{ inputs.scenario }}"
        echo "- **Environment**: ${{ inputs.environment }}"
        echo "- **Enforce Thresholds**: ${{ inputs.enforce_thresholds }}"
        echo "- **Test Status**: ${{ needs.load-tests.result }}"
        echo "- **Performance Gate**: ${{ needs.performance-gate.result }}"
        echo ""
        echo "## Artifacts"
        echo "Test results and reports are available in the workflow artifacts."
        echo ""
        echo "## Next Steps"
        if [ "${{ needs.load-tests.result }}" == "success" ]; then
          echo "✅ Load tests passed - system is ready for production traffic"
        else
          echo "❌ Load tests failed - investigate performance issues before deployment"
        fi