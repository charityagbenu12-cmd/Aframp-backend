name: CI/CD Pipeline

on:
  pull_request:
    # only run CI for pull requests targeting the development branch;
    # explicit check below rejects attempts to open PRs against main
    branches: [develop]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_load_tests:
        description: "Run load tests before production deploy"
        required: false
        type: boolean
        default: false
      enforce_load_test_gate:
        description: "Block production deploy if load tests fail"
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  check-target:
    name: Ensure PRs target develop
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Verify base branch
        run: |
          echo "Base branch is ${{ github.event.pull_request.base.ref }}"
          if [ "${{ github.event.pull_request.base.ref }}" = "main" ]; then
            echo "🚫 Pull requests must target the 'develop' branch, not 'main'."
            exit 1
          fi

  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      integration: ${{ steps.filter.outputs.integration }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            rust:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'src/**'
              - 'tests/**'
              - 'examples/**'
            integration:
              - 'migrations/**'
              - 'db/**'
              - 'src/database/**'
              - 'src/cache/**'
              - 'tests/cache_integration_test.rs'
              - 'tests/*integration*.rs'
            ci:
              - '.github/workflows/**'

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [changes]
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features

  validate-gateway-config:
    name: Validate Gateway Configuration
    runs-on: ubuntu-latest
    needs: [changes]
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Validate nginx configuration syntax
        run: |
          docker run --rm \
            -v "$PWD/config/nginx:/etc/nginx:ro" \
            nginx:stable-alpine nginx -t -c /etc/nginx/nginx.conf 2>&1 || true
          # Verify required security directives are present (config-as-code drift detection)
          grep -q 'ssl_protocols TLSv1.2 TLSv1.3' config/nginx/nginx.conf || (echo 'FAIL: TLS 1.2+ not enforced' && exit 1)
          grep -q 'ssl_stapling on' config/nginx/nginx.conf || (echo 'FAIL: OCSP stapling not enabled' && exit 1)
          grep -q 'Strict-Transport-Security' config/nginx/nginx.conf || (echo 'FAIL: HSTS not configured' && exit 1)
          grep -q 'return 301 https://' config/nginx/nginx.conf || (echo 'FAIL: HTTP->HTTPS redirect missing' && exit 1)
          grep -q 'server_tokens off' config/nginx/nginx.conf || (echo 'FAIL: server_tokens not disabled' && exit 1)
          grep -q 'X-Frame-Options' config/nginx/nginx.conf || (echo 'FAIL: X-Frame-Options missing' && exit 1)
          grep -q 'X-Content-Type-Options' config/nginx/nginx.conf || (echo 'FAIL: X-Content-Type-Options missing' && exit 1)
          ! grep -q 'TLSv1.0\|TLSv1.1' config/nginx/nginx.conf || (echo 'FAIL: Weak TLS versions present' && exit 1)
          ! grep -q 'RC4\|DES\|MD5\|EXPORT\|NULL\|aNULL' config/nginx/nginx.conf || (echo 'FAIL: Weak ciphers present' && exit 1)
          echo 'Gateway configuration validation passed'

      - name: Run gateway unit tests
        run: cargo test --lib --features database gateway:: -- --test-threads=4

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [changes]
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run unit tests only
        run: cargo test --lib --bins --all-features -- --test-threads=4

  integration-tests:
    name: Integration Tests (Postgres + Redis)
    runs-on: ubuntu-latest
    needs: [changes]
    if: github.event_name == 'push' || needs.changes.outputs.integration == 'true'
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aframp_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:6
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/aframp_test
        run: sqlx migrate run

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/aframp_test
          REDIS_URL: redis://localhost:6379
        run: cargo test --tests --all-features -- --test-threads=2

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [changes]
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Run cargo audit
        run: |
          cargo install cargo-audit
          cargo audit

  build-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, integration-tests, security-scan, validate-gateway-config]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: "sarif"
          output: "trivy-results.sarif"

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://staging.aframp.com
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "Deploying ${{ needs.build-push.outputs.image-tag }} to staging"
          # Add your deployment commands here (kubectl, docker-compose, etc.)

      - name: Health check
        run: |
          sleep 10
          # curl -f https://staging.aframp.com/health || exit 1

  load-tests:
    name: Load Tests (Optional Gate)
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.event_name == 'workflow_dispatch' && inputs.run_load_tests == true
    env:
      BASE_URL: ${{ secrets.LOAD_TEST_BASE_URL }}
      LOAD_TEST_API_KEY: ${{ secrets.LOAD_TEST_API_KEY }}
      TEST_WALLET_ADDRESS: ${{ secrets.LOAD_TEST_WALLET_ADDRESS }}
      TEST_TX_ID: ${{ secrets.LOAD_TEST_TX_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Run sustained scenario
        run: ./load-tests/run.sh sustained

      - name: Upload load-test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: load-tests-${{ github.run_number }}
          path: load-tests/results/runs/**
          if-no-files-found: error

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-push, deploy-staging]
    if: >
      github.event_name == 'push' && github.ref == 'refs/heads/main' ||
      (
        github.event_name == 'workflow_dispatch' &&
        (inputs.run_load_tests == false || inputs.enforce_load_test_gate == false)
      )
    environment:
      name: production
      url: https://aframp.com
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "Deploying ${{ needs.build-push.outputs.image-tag }} to production"
          # Add your deployment commands here

      - name: Health check
        run: |
          sleep 10
          # curl -f https://aframp.com/health || exit 1

      - name: Notify on failure
        if: failure()
        run: |
          echo "Deployment failed - implement notification here"
          # Add Slack/email notification

  deploy-production-after-load-tests:
    name: Deploy to Production (After Load Tests)
    runs-on: ubuntu-latest
    needs: [build-push, deploy-staging, load-tests]
    if: >
      github.event_name == 'workflow_dispatch' &&
      inputs.run_load_tests == true &&
      inputs.enforce_load_test_gate == true &&
      needs.load-tests.result == 'success'
    environment:
      name: production
      url: https://aframp.com
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "Deploying ${{ needs.build-push.outputs.image-tag }} to production"
          # Add your deployment commands here

      - name: Health check
        run: |
          sleep 10
          # curl -f https://aframp.com/health || exit 1
